# SonarQube Configuration — El Surtidor Cochabambino
# ====================================================
# Ejecutar análisis local:
#   npx sonar-scanner
# O via Docker:
#   docker run --rm -e SONAR_HOST_URL=http://localhost:9000 \
#     -e SONAR_TOKEN=<tu_token> \
#     -v ${PWD}:/usr/src sonarsource/sonar-scanner-cli

sonar.projectKey=surtidor-cochabambino
sonar.projectName=El Surtidor Cochabambino — Sistema Digital
sonar.projectVersion=1.0.0
sonar.organization=angel-gg

# Fuentes de código a analizar
sonar.sources=src
sonar.tests=__tests__

# Lenguaje
sonar.language=js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusiones
sonar.exclusions=\
  **/.next/**,\
  **/node_modules/**,\
  **/prisma/**,\
  **/*.config.js,\
  **/backup_codigo/**

# Encoding
sonar.sourceEncoding=UTF-8

# Cobertura
sonar.coverage.exclusions=\
  **/__tests__/**,\
  **/seed.js,\
  **/globals.css

# Quality Gate — umbrales mínimos aceptados
# Duplicación de código < 3%
# Cobertura de tests > 70%
# Bugs = 0
# Vulnerabilidades = 0
